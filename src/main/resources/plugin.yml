name: Brick-MapProtect
version: 1.4.0
main: com.brick.mapprotect.MapProtectPlugin
api-version: '1.21'
author: GENRUSH
description: Protects original map blocks; only creative-mode players can break them. Configurable per-world.
commands:
  mapprotect:
    description: Manage Brick-MapProtect.
    usage: /mapprotect reload
    permission: mapprotect.admin
permissions:
  mapprotect.bypass:
    description: Explicit override to break/place any block without being in creative mode.
    default: false
  mapprotect.admin:
    description: Allows use of /mapprotect commands (e.g. reload).
    default: op
