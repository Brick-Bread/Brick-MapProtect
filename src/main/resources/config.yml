# ============================================================
#  Brick-MapProtect  —  configuration
# ============================================================
#
#  Protects the ORIGINAL blocks of your maps from being broken.
#  Only players in CREATIVE mode can break original map blocks;
#  everyone else can still place blocks and break blocks that
#  players have placed.
#
#  After editing this file, run:  /mapprotect reload
# ------------------------------------------------------------


# Which maps (worlds) should be protected?
#   - List the exact world folder names, one per line.
#   - Use a single "*" to protect EVERY world on the server.
#   - Worlds NOT listed here are left completely untouched
#     (players can break and place freely in them).
protected-worlds:
  - world
  - world_nether
  - world_the_end


# Are regular players allowed to place blocks on protected maps?
#   true  = players can place blocks (and later break their own).
#   false = players cannot place any blocks on protected maps.
#           (Players in CREATIVE mode can always place, regardless
#            of this setting. Op status grants no exemption.)
allow-placing: true


# Stop flowing water & lava from washing away / destroying the
# original map blocks (torches, redstone, plants, etc.).
# Also stops buckets being emptied onto original blocks.
# Liquids can still flow through open space, so building works normally.
protect-from-liquids: true

# Stop fire and lava from BURNING original map blocks.
# (Player-placed blocks can still catch fire.)
protect-from-fire: true

# Stop explosions (TNT, creepers, beds, ...) from destroying original
# map blocks. Player-placed blocks still blow up normally.
protect-from-explosions: true

# Stop pistons from pushing/pulling original map blocks out of position
# (the classic bypass for break protection). Pistons that move only
# player-placed blocks still work. Set to false if your map relies on
# piston contraptions that move original blocks.
protect-from-pistons: true

# Stop entity griefing: endermen stealing blocks, silverfish burrowing,
# original sand/gravel being dropped, etc.
protect-from-entity-grief: true


# Wipe the map clean on every restart?
#   true  = every block players have placed is removed (set to air) when
#           the server starts, restoring the map to its original state.
#   false = player-placed blocks are kept across restarts. (default)
clear-placed-on-restart: false


# ---- Messages (supports & colour codes) --------------------

# Shown when a player tries to break an original map block.
deny-break-message: "&cYou must be in creative mode to break blocks in this map."

# Shown when placing is disabled and a player tries to place a block.
deny-place-message: "&cBlock placing is disabled on this map."
